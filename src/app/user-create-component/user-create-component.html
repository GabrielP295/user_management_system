<div class="signup-container">
  <div class="form-card">
    <div class="form-header">
      <div class="header-text">
        <h1>{{ isEditMode ? 'Edit User Account' : 'Create User Account' }}</h1>
      </div>
      <a class="btn btn-secondary" routerLink="/user-list-component">View All Users</a>
    </div>

    <form [formGroup]="userProperties" class="signup-form">
      <!-- Name Section -->
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name: <span class="required">*</span></label>
          <input
            id="firstName"
            formControlName="firstName"
            type="text"
            class="form-control"
            placeholder="Enter first name"
            required
          />
        </div>

        <div class="form-group">
          <label for="lastName">Last Name: <span class="required">*</span></label>
          <input
            id="lastName"
            formControlName="lastName"
            type="text"
            class="form-control"
            placeholder="Enter last name"
            required
          />
        </div>
      </div>

      <!-- Email Section -->
      <div class="form-group">
        <label for="email">Email: <span class="required">*</span></label>
        <input
          id="email"
          formControlName="email"
          type="email"
          class="form-control"
          placeholder="Enter email address"
          required
        />
      </div>

      <!-- Age Section -->
      <div class="form-group">
        <label for="age">Age: <span class="required">*</span></label>
        <input
          id="age"
          formControlName="age"
          type="number"
          class="form-control"
          placeholder="Enter age"
          required
        />
      </div>

      <!-- About Me Section -->
      <div class="form-group">
        <label for="aboutMe">About Me:</label>
        <textarea
          id="aboutMe"
          formControlName="aboutMe"
          class="form-control"
          placeholder="Tell us about yourself..."
          rows="4"
        ></textarea>
      </div>

      <!-- Hobbies Section -->
      <div class="hobbies-section">
        <label class="section-label">Hobbies</label>
        <div formArrayName="hobbies">
          @for (hobby of getHobbies().controls; track hobby) {
            <div class="form-group hobby-input">
              <input
                id="hobby"
                [formControlName]="$index"
                type="text"
                class="form-control"
                placeholder="Enter hobby"
              />
            </div>
          }
        </div>
        <div class="hobby-buttons">
          <button type="button" class="btn btn-add" (click)="addHobbyInput()">Add Hobby</button>
          <button
            type="button"
            class="btn btn-remove"
            (click)="removeHobbyInput()"
            [disabled]="getHobbies().length <= 1"
          >
            Remove Hobby
          </button>
        </div>
      </div>

      <!-- Premium User Section -->
      <div class="form-group checkbox-group">
        <label for="premiumUser" class="checkbox-label">
          <input
            id="premiumUser"
            formControlName="premiumUser"
            type="checkbox"
            class="form-check-input"
          />
          <span>Mark as Premium User ⭐</span>
        </label>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" (click)="onSubmitUser()">
          {{ isEditMode ? 'Update User' : 'Create User' }}
        </button>
      </div>
    </form>
  </div>
</div>
